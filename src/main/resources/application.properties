spring.application.name=backend

# Veritabanı bağlantısı (Railway PG değişkenlerinden)
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:oceantech}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:1903derya}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server port
server.port=${PORT:8080}

# CORS
spring.web.cors.allowed-origins=http://localhost:5174,https://ocean-tech-xi.vercel.app